<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Who's More Famous? 🌍</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a1a;
    --card-a: linear-gradient(135deg, #7c3aed, #db2777);
    --card-b: linear-gradient(135deg, #0891b2, #16a34a);
    --gold: #fbbf24;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --surface: #1e1b4b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG animated */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(124,58,237,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(8,145,178,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(219,39,119,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 700px;
    margin: 0 auto;
    padding: 20px 16px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* HEADER */
  header {
    text-align: center;
    margin-bottom: 24px;
    animation: fadeDown 0.6s ease;
  }
  header h1 {
    font-family: 'Boogaloo', cursive;
    font-size: clamp(2rem, 6vw, 3rem);
    background: linear-gradient(90deg, #a78bfa, #f472b6, #38bdf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }
  header p {
    color: var(--muted);
    font-size: 0.95rem;
    margin-top: 6px;
  }

  /* SCORE BAR */
  .score-bar {
    display: flex;
    align-items: center;
    gap: 20px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50px;
    padding: 10px 24px;
    margin-bottom: 28px;
    backdrop-filter: blur(10px);
    animation: fadeDown 0.6s ease 0.1s both;
  }
  .score-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.95rem;
    font-weight: 700;
  }
  .score-item span:first-child { font-size: 1.2rem; }
  .score-val { color: var(--gold); font-size: 1.1rem; }
  .streak-val { color: #f472b6; font-size: 1.1rem; }
  .streak-val.pulse {
    animation: pulse 0.4s ease;
  }

  /* QUESTION COUNTER */
  .question-counter {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 16px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* VERSUS */
  .versus-text {
    font-family: 'Boogaloo', cursive;
    font-size: 1.1rem;
    color: var(--gold);
    text-align: center;
    margin: 12px 0;
    opacity: 0.9;
  }

  /* CARDS */
  .cards-wrapper {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    width: 100%;
    margin-bottom: 20px;
  }
  @media (max-width: 480px) {
    .cards-wrapper { grid-template-columns: 1fr; gap: 12px; }
    .versus-text { display: none; }
  }

  .card {
    border-radius: 20px;
    padding: 32px 20px;
    cursor: pointer;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    animation: fadeUp 0.5s ease both;
    border: 2px solid transparent;
  }
  .card:nth-child(1) { background: var(--card-a); animation-delay: 0.1s; }
  .card:nth-child(3) { background: var(--card-b); animation-delay: 0.2s; }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.2s ease;
    border-radius: inherit;
  }
  .card:hover::before { background: rgba(255,255,255,0.08); }
  .card:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
  .card:active { transform: scale(0.97); }

  .card.disabled { cursor: default; pointer-events: none; }
  .card.winner {
    border-color: var(--gold);
    box-shadow: 0 0 30px rgba(251,191,36,0.4);
    animation: winPulse 0.5s ease;
  }
  .card.loser { filter: brightness(0.5) saturate(0.3); }

  .card-emoji { font-size: 3.5rem; margin-bottom: 12px; display: block; line-height: 1; }
  .card-name {
    font-family: 'Boogaloo', cursive;
    font-size: clamp(1.2rem, 4vw, 1.6rem);
    font-weight: 400;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    line-height: 1.2;
  }
  .card-category {
    font-size: 0.75rem;
    opacity: 0.7;
    margin-top: 6px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* SCORE REVEAL on card */
  .score-reveal {
    margin-top: 14px;
    font-size: 2rem;
    font-family: 'Boogaloo', cursive;
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .score-reveal.show { opacity: 1; transform: scale(1); }
  .score-label { font-size: 0.75rem; opacity: 0.8; display: block; margin-top: 2px; }

  /* RESULT BOX */
  .result-box {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 20px;
    backdrop-filter: blur(10px);
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.4s ease 0.3s;
  }
  .result-box.show { opacity: 1; transform: translateY(0); }

  .result-status {
    font-family: 'Boogaloo', cursive;
    font-size: 1.6rem;
    margin-bottom: 8px;
  }
  .result-status.correct { color: #4ade80; }
  .result-status.wrong { color: #f87171; }

  .result-explanation {
    color: var(--muted);
    font-size: 0.92rem;
    line-height: 1.6;
    min-height: 40px;
  }

  .loading-dots span {
    display: inline-block;
    animation: dotBounce 1.2s infinite;
    font-size: 1.5rem;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  /* NEXT BUTTON */
  .btn-next {
    background: linear-gradient(135deg, #7c3aed, #db2777);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 14px 40px;
    font-family: 'Boogaloo', cursive;
    font-size: 1.3rem;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    opacity: 0;
    animation: none;
    display: none;
  }
  .btn-next.show {
    display: block;
    opacity: 1;
    animation: fadeUp 0.4s ease 0.6s both;
  }
  .btn-next:hover { transform: scale(1.05); box-shadow: 0 8px 24px rgba(124,58,237,0.5); }

  /* GAME OVER */
  #game-over {
    display: none;
    text-align: center;
    animation: fadeUp 0.6s ease;
    width: 100%;
  }
  #game-over h2 {
    font-family: 'Boogaloo', cursive;
    font-size: 3rem;
    background: linear-gradient(90deg, #fbbf24, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  .final-score {
    font-size: 1.1rem;
    color: var(--muted);
    margin-bottom: 32px;
  }
  .final-score strong { color: var(--gold); font-size: 1.4rem; }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 16px 8px;
  }
  .stat-card .stat-num {
    font-family: 'Boogaloo', cursive;
    font-size: 2rem;
    color: var(--gold);
    display: block;
  }
  .stat-card .stat-label { font-size: 0.8rem; color: var(--muted); }

  .btn-restart {
    background: linear-gradient(135deg, #0891b2, #16a34a);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 16px 48px;
    font-family: 'Boogaloo', cursive;
    font-size: 1.5rem;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-restart:hover { transform: scale(1.05); box-shadow: 0 8px 24px rgba(8,145,178,0.5); }

  /* CONFETTI */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -10px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
    pointer-events: none;
    z-index: 999;
  }

  /* ANIMATIONS */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.4); }
    100% { transform: scale(1); }
  }
  @keyframes winPulse {
    0% { transform: scale(1); }
    40% { transform: scale(1.06); }
    100% { transform: scale(1); }
  }
  @keyframes dotBounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-8px); }
  }
  @keyframes confettiFall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
  @keyframes slideOut {
    to { opacity: 0; transform: translateX(-60px); }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>🌍 Who's More Famous?</h1>
    <p>Devine lequel est le plus connu dans le monde !</p>
  </header>

  <div class="score-bar">
    <div class="score-item">
      <span>⭐</span>
      <span>Score</span>
      <span class="score-val" id="score-display">0</span>
    </div>
    <div class="score-item">
      <span>🔥</span>
      <span>Série</span>
      <span class="streak-val" id="streak-display">0</span>
    </div>
    <div class="score-item">
      <span>✅</span>
      <span id="correct-display">0</span>
      <span style="color:var(--muted)">/ 10</span>
    </div>
  </div>

  <div id="game-area">
    <div class="question-counter" id="q-counter">Question 1 / 10</div>

    <div class="cards-wrapper" id="cards-wrapper">
      <div class="card" id="card-a" onclick="choose('A')">
        <span class="card-emoji" id="emoji-a">🎤</span>
        <div class="card-name" id="name-a">...</div>
        <div class="card-category" id="cat-a"></div>
        <div class="score-reveal" id="score-a"></div>
      </div>

      <div class="versus-text">VS</div>

      <div class="card" id="card-b" onclick="choose('B')">
        <span class="card-emoji" id="emoji-b">🍞</span>
        <div class="card-name" id="name-b">...</div>
        <div class="card-category" id="cat-b"></div>
        <div class="score-reveal" id="score-b"></div>
      </div>
    </div>

    <div class="result-box" id="result-box">
      <div class="result-status" id="result-status"></div>
      <div class="result-explanation" id="result-explanation">
        <div class="loading-dots"><span>.</span><span>.</span><span>.</span></div>
      </div>
    </div>

    <button class="btn-next" id="btn-next" onclick="nextQuestion()">Suivant →</button>
  </div>

  <div id="game-over">
    <h2>🏆 Game Over !</h2>
    <div class="final-score">
      Score final : <strong id="final-score-val">0</strong> points
    </div>
    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-num" id="stat-correct">0</span>
        <span class="stat-label">Bonnes réponses</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="stat-streak">0</span>
        <span class="stat-label">Meilleure série</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="stat-pct">0%</span>
        <span class="stat-label">Précision</span>
      </div>
    </div>
    <button class="btn-restart" onclick="restartGame()">🔄 Rejouer</button>
  </div>
</div>

// =====================
// ÉTAT DU JEU
// =====================
let pairs = [];
let currentPair = null;
let questionIndex = 0;
let score = 0;
let streak = 0;
let bestStreak = 0;
let correctCount = 0;
let answered = false;
const TOTAL_QUESTIONS = 10;

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function initGame() {
  pairs = shuffle(ALL_PAIRS).slice(0, TOTAL_QUESTIONS);
  questionIndex = 0;
  score = 0;
  streak = 0;
  bestStreak = 0;
  correctCount = 0;
  answered = false;

  document.getElementById('game-area').style.display = 'flex';
  document.getElementById('game-area').style.flexDirection = 'column';
  document.getElementById('game-area').style.alignItems = 'center';
  document.getElementById('game-area').style.width = '100%';
  document.getElementById('game-over').style.display = 'none';

  updateScoreDisplay();
  loadQuestion();
}

function loadQuestion() {
  answered = false;
  currentPair = pairs[questionIndex];

  // Reset UI
  const cardA = document.getElementById('card-a');
  const cardB = document.getElementById('card-b');
  cardA.className = 'card';
  cardB.className = 'card';
  cardA.onclick = () => choose('A');
  cardB.onclick = () => choose('B');

  document.getElementById('score-a').className = 'score-reveal';
  document.getElementById('score-b').className = 'score-reveal';
  document.getElementById('result-box').className = 'result-box';
  document.getElementById('btn-next').className = 'btn-next';
  document.getElementById('result-explanation').innerHTML = '<div class="loading-dots"><span>.</span><span>.</span><span>.</span></div>';

  // Fill cards
  document.getElementById('emoji-a').textContent = currentPair.a.emoji;
  document.getElementById('name-a').textContent = currentPair.a.name;
  document.getElementById('cat-a').textContent = currentPair.a.cat;
  document.getElementById('emoji-b').textContent = currentPair.b.emoji;
  document.getElementById('name-b').textContent = currentPair.b.name;
  document.getElementById('cat-b').textContent = currentPair.b.cat;

  document.getElementById('score-a').innerHTML = `${currentPair.sA}/100 <span class="score-label">notoriété</span>`;
  document.getElementById('score-b').innerHTML = `${currentPair.sB}/100 <span class="score-label">notoriété</span>`;

  document.getElementById('q-counter').textContent = `Question ${questionIndex + 1} / ${TOTAL_QUESTIONS}`;
}

function choose(choice) {
  if (answered) return;
  answered = true;

  const correct = choice === currentPair.winner;
  const cardA = document.getElementById('card-a');
  const cardB = document.getElementById('card-b');

  cardA.classList.add('disabled');
  cardB.classList.add('disabled');
  cardA.onclick = null;
  cardB.onclick = null;

  // Show scores
  document.getElementById('score-a').classList.add('show');
  document.getElementById('score-b').classList.add('show');

  // Winner / loser
  const winnerCard = currentPair.winner === 'A' ? cardA : cardB;
  const loserCard = currentPair.winner === 'A' ? cardB : cardA;
  winnerCard.classList.add('winner');
  loserCard.classList.add('loser');

  // Update score
  if (correct) {
    correctCount++;
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    const multiplier = streak >= 8 ? 2.5 : streak >= 5 ? 2 : streak >= 3 ? 1.5 : 1;
    const points = Math.round(10 * multiplier);
    score += points;
    if (streak > 1) triggerConfetti();
  } else {
    streak = 0;
  }

  updateScoreDisplay();

  // Result box
  const resultBox = document.getElementById('result-box');
  const resultStatus = document.getElementById('result-status');
  resultStatus.textContent = correct ? '✅ Bonne réponse !' : '❌ Raté...';
  resultStatus.className = 'result-status ' + (correct ? 'correct' : 'wrong');
  resultBox.classList.add('show');

  // Explanation (simulated with delay for fun)
  setTimeout(() => {
    document.getElementById('result-explanation').textContent = currentPair.exp;
  }, 600);

  // Next button
  setTimeout(() => {
    document.getElementById('btn-next').classList.add('show');
  }, 800);
}

function nextQuestion() {
  questionIndex++;
  if (questionIndex >= TOTAL_QUESTIONS) {
    showGameOver();
    return;
  }
  loadQuestion();
}

function updateScoreDisplay() {
  document.getElementById('score-display').textContent = score;
  const streakEl = document.getElementById('streak-display');
  streakEl.textContent = streak;
  streakEl.className = 'streak-val';
  if (streak > 0) {
    void streakEl.offsetWidth;
    streakEl.className = 'streak-val pulse';
  }
  document.getElementById('correct-display').textContent = correctCount;
}

function showGameOver() {
  document.getElementById('game-area').style.display = 'none';
  const go = document.getElementById('game-over');
  go.style.display = 'block';
  document.getElementById('final-score-val').textContent = score;
  document.getElementById('stat-correct').textContent = correctCount;
  document.getElementById('stat-streak').textContent = bestStreak;
  document.getElementById('stat-pct').textContent = Math.round((correctCount / TOTAL_QUESTIONS) * 100) + '%';
  triggerConfetti(30);
}

function restartGame() {
  initGame();
}

function triggerConfetti(count = 15) {
  const colors = ['#f472b6','#a78bfa','#38bdf8','#fbbf24','#4ade80','#fb923c'];
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.width = (8 + Math.random() * 8) + 'px';
      el.style.height = (8 + Math.random() * 8) + 'px';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      el.style.animationDelay = (Math.random() * 0.5) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 60);
  }
}

// Start !
initGame();
