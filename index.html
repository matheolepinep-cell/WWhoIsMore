<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Who's More Famous? 🌍</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a1a;
    --card-a: linear-gradient(135deg, #7c3aed, #db2777);
    --card-b: linear-gradient(135deg, #0891b2, #16a34a);
    --gold: #fbbf24;
    --text: #f1f5f9;
    --muted: #94a3b8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(124,58,237,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(8,145,178,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(219,39,119,0.08) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  .container {
    position: relative; z-index: 1;
    max-width: 760px; margin: 0 auto;
    padding: 20px 16px; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
  }
  header { text-align: center; margin-bottom: 20px; animation: fadeDown 0.6s ease; }
  header h1 {
    font-family: 'Boogaloo', cursive;
    font-size: clamp(2rem, 6vw, 3rem);
    background: linear-gradient(90deg, #a78bfa, #f472b6, #38bdf8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    line-height: 1.1;
  }
  header p { color: var(--muted); font-size: 0.95rem; margin-top: 6px; }

  .score-bar {
    display: flex; align-items: center; gap: 20px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50px; padding: 10px 24px; margin-bottom: 24px;
    backdrop-filter: blur(10px);
    animation: fadeDown 0.6s ease 0.1s both;
    flex-wrap: wrap; justify-content: center;
  }
  .score-item { display: flex; align-items: center; gap: 8px; font-size: 0.95rem; font-weight: 700; }
  .score-val { color: var(--gold); font-size: 1.1rem; }
  .streak-val { color: #f472b6; font-size: 1.1rem; }
  .streak-val.pulse { animation: pulse 0.4s ease; }

  .question-counter {
    color: var(--muted); font-size: 0.85rem; margin-bottom: 14px;
    font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
  }

  /* CARDS CÔTE À CÔTE */
  .cards-area {
    width: 100%; display: flex; flex-direction: row;
    align-items: stretch; margin-bottom: 20px;
  }
  .card {
    flex: 1; padding: 28px 14px; cursor: pointer;
    text-align: center; position: relative; overflow: hidden;
    transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.3s ease;
    animation: fadeUp 0.5s ease both;
    border: 2px solid transparent; min-width: 0;
  }
  #card-a { background: var(--card-a); border-radius: 20px 0 0 20px; animation-delay: 0.1s; }
  #card-b { background: var(--card-b); border-radius: 0 20px 20px 0; animation-delay: 0.2s; }

  .vs-divider {
    width: 44px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(10,10,26,0.8); z-index: 2;
  }
  .vs-divider span {
    font-family: 'Boogaloo', cursive; font-size: 1.1rem; color: var(--gold);
    background: #1a1a35; border: 2px solid rgba(251,191,36,0.5);
    border-radius: 50%; width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
  }
  .card::before {
    content: ''; position: absolute; inset: 0;
    background: rgba(255,255,255,0); transition: background 0.2s ease;
  }
  .card:hover::before { background: rgba(255,255,255,0.08); }
  .card:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
  .card:active { transform: scale(0.97); }
  .card.disabled { cursor: default; pointer-events: none; }
  .card.winner { border-color: var(--gold); box-shadow: 0 0 30px rgba(251,191,36,0.4); }
  .card.loser { filter: brightness(0.4) saturate(0.2); }

  .card-emoji { font-size: 3rem; margin-bottom: 10px; display: block; }
  .card-name {
    font-family: 'Boogaloo', cursive;
    font-size: clamp(1rem, 3.5vw, 1.5rem);
    text-shadow: 0 2px 8px rgba(0,0,0,0.3); line-height: 1.2;
  }
  .card-category { font-size: 0.7rem; opacity: 0.7; margin-top: 5px; text-transform: uppercase; letter-spacing: 0.08em; }
  .score-reveal {
    margin-top: 12px; font-size: 1.7rem;
    font-family: 'Boogaloo', cursive;
    opacity: 0; transform: scale(0.5);
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .score-reveal.show { opacity: 1; transform: scale(1); }
  .score-label { font-size: 0.68rem; opacity: 0.8; display: block; margin-top: 2px; }

  .result-box {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px; padding: 18px 22px; margin-bottom: 18px;
    backdrop-filter: blur(10px);
    opacity: 0; transform: translateY(10px);
    transition: all 0.4s ease 0.3s;
  }
  .result-box.show { opacity: 1; transform: translateY(0); }
  .result-status { font-family: 'Boogaloo', cursive; font-size: 1.5rem; margin-bottom: 6px; }
  .result-status.correct { color: #4ade80; }
  .result-status.wrong { color: #f87171; }
  .result-explanation { color: var(--muted); font-size: 0.9rem; line-height: 1.6; min-height: 36px; }
  .loading-dots span { display: inline-block; animation: dotBounce 1.2s infinite; font-size: 1.4rem; }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  .btn-next {
    background: linear-gradient(135deg, #7c3aed, #db2777);
    color: white; border: none; border-radius: 50px;
    padding: 14px 40px; font-family: 'Boogaloo', cursive; font-size: 1.3rem;
    cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
    display: none; opacity: 0;
  }
  .btn-next.show { display: block; opacity: 1; animation: fadeUp 0.4s ease 0.6s both; }
  .btn-next:hover { transform: scale(1.05); box-shadow: 0 8px 24px rgba(124,58,237,0.5); }

  #game-over { display: none; text-align: center; animation: fadeUp 0.6s ease; width: 100%; }
  #game-over h2 {
    font-family: 'Boogaloo', cursive; font-size: 3rem;
    background: linear-gradient(90deg, #fbbf24, #f472b6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 8px;
  }
  .final-score { font-size: 1.1rem; color: var(--muted); margin-bottom: 28px; }
  .final-score strong { color: var(--gold); font-size: 1.4rem; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 28px; }
  .stat-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px; padding: 16px 8px;
  }
  .stat-card .stat-num { font-family: 'Boogaloo', cursive; font-size: 2rem; color: var(--gold); display: block; }
  .stat-card .stat-label { font-size: 0.78rem; color: var(--muted); }
  .btn-restart {
    background: linear-gradient(135deg, #0891b2, #16a34a);
    color: white; border: none; border-radius: 50px;
    padding: 16px 48px; font-family: 'Boogaloo', cursive; font-size: 1.5rem;
    cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn-restart:hover { transform: scale(1.05); box-shadow: 0 8px 24px rgba(8,145,178,0.5); }

  .confetti-piece {
    position: fixed; width: 10px; height: 10px; top: -10px;
    border-radius: 2px; animation: confettiFall linear forwards;
    pointer-events: none; z-index: 999;
  }

  @keyframes fadeDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes pulse { 0%{transform:scale(1)} 50%{transform:scale(1.4)} 100%{transform:scale(1)} }
  @keyframes dotBounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-8px)} }
  @keyframes confettiFall { to{transform:translateY(110vh) rotate(720deg);opacity:0} }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🌍 Who's More Famous?</h1>
    <p>Devine lequel est le plus connu dans le monde !</p>
  </header>

  <div class="score-bar">
    <div class="score-item"><span>⭐</span><span>Score</span><span class="score-val" id="score-display">0</span></div>
    <div class="score-item"><span>🔥</span><span>Série</span><span class="streak-val" id="streak-display">0</span></div>
    <div class="score-item"><span>✅</span><span id="correct-display">0</span><span style="color:var(--muted)">&nbsp;/ 10</span></div>
  </div>

  <div id="game-area" style="width:100%;display:flex;flex-direction:column;align-items:center;">
    <div class="question-counter" id="q-counter">Question 1 / 10</div>
    <div class="cards-area">
      <div class="card" id="card-a" onclick="choose('A')">
        <span class="card-emoji" id="emoji-a">🎤</span>
        <div class="card-name" id="name-a">...</div>
        <div class="card-category" id="cat-a"></div>
        <div class="score-reveal" id="score-a"></div>
      </div>
      <div class="vs-divider"><span>VS</span></div>
      <div class="card" id="card-b" onclick="choose('B')">
        <span class="card-emoji" id="emoji-b">🍞</span>
        <div class="card-name" id="name-b">...</div>
        <div class="card-category" id="cat-b"></div>
        <div class="score-reveal" id="score-b"></div>
      </div>
    </div>
    <div class="result-box" id="result-box">
      <div class="result-status" id="result-status"></div>
      <div class="result-explanation" id="result-explanation">
        <div class="loading-dots"><span>.</span><span>.</span><span>.</span></div>
      </div>
    </div>
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">Suivant →</button>
  </div>

  <div id="game-over">
    <h2>🏆 Game Over !</h2>
    <div class="final-score">Score final : <strong id="final-score-val">0</strong> points</div>
    <div class="stats-grid">
      <div class="stat-card"><span class="stat-num" id="stat-correct">0</span><span class="stat-label">Bonnes réponses</span></div>
      <div class="stat-card"><span class="stat-num" id="stat-streak">0</span><span class="stat-label">Meilleure série</span></div>
      <div class="stat-card"><span class="stat-num" id="stat-pct">0%</span><span class="stat-label">Précision</span></div>
    </div>
    <button class="btn-restart" onclick="restartGame()">🔄 Rejouer</button>
  </div>
</div>

// ── GAME ──
let pairs=[], currentPair=null, questionIndex=0, score=0, streak=0, bestStreak=0, correctCount=0, answered=false;
const TOTAL=10;
function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
function initGame(){
  pairs=shuffle(ALL_PAIRS).slice(0,TOTAL);
  questionIndex=score=streak=bestStreak=correctCount=0; answered=false;
  document.getElementById('game-area').style.display='flex';
  document.getElementById('game-over').style.display='none';
  updateScore(); loadQ();
}
function loadQ(){
  answered=false; currentPair=pairs[questionIndex];
  const cA=document.getElementById('card-a'), cB=document.getElementById('card-b');
  cA.className='card'; cB.className='card';
  cA.onclick=()=>choose('A'); cB.onclick=()=>choose('B');
  document.getElementById('score-a').className='score-reveal';
  document.getElementById('score-b').className='score-reveal';
  document.getElementById('result-box').className='result-box';
  document.getElementById('btn-next').className='btn-next';
  document.getElementById('result-explanation').innerHTML='<div class="loading-dots"><span>.</span><span>.</span><span>.</span></div>';
  document.getElementById('emoji-a').textContent=currentPair.a.emoji;
  document.getElementById('name-a').textContent=currentPair.a.name;
  document.getElementById('cat-a').textContent=currentPair.a.cat;
  document.getElementById('emoji-b').textContent=currentPair.b.emoji;
  document.getElementById('name-b').textContent=currentPair.b.name;
  document.getElementById('cat-b').textContent=currentPair.b.cat;
  document.getElementById('score-a').innerHTML=`${currentPair.sA}<span class="score-label">/100 notoriété</span>`;
  document.getElementById('score-b').innerHTML=`${currentPair.sB}<span class="score-label">/100 notoriété</span>`;
  document.getElementById('q-counter').textContent=`Question ${questionIndex+1} / ${TOTAL}`;
}
function choose(choice){
  if(answered)return; answered=true;
  const correct=choice===currentPair.winner;
  const cA=document.getElementById('card-a'), cB=document.getElementById('card-b');
  cA.classList.add('disabled'); cB.classList.add('disabled');
  cA.onclick=null; cB.onclick=null;
  document.getElementById('score-a').classList.add('show');
  document.getElementById('score-b').classList.add('show');
  const wC=currentPair.winner==='A'?cA:cB, lC=currentPair.winner==='A'?cB:cA;
  wC.classList.add('winner'); lC.classList.add('loser');
  if(correct){correctCount++;streak++;if(streak>bestStreak)bestStreak=streak;const m=streak>=8?2.5:streak>=5?2:streak>=3?1.5:1;score+=Math.round(10*m);if(streak>1)confetti();}else{streak=0;}
  updateScore();
  const rb=document.getElementById('result-box'), rs=document.getElementById('result-status');
  rs.textContent=correct?'✅ Bonne réponse !':'❌ Raté...';
  rs.className='result-status '+(correct?'correct':'wrong');
  rb.classList.add('show');
  setTimeout(()=>{document.getElementById('result-explanation').textContent=currentPair.exp;},600);
  setTimeout(()=>{document.getElementById('btn-next').classList.add('show');},800);
}
function nextQuestion(){questionIndex++;if(questionIndex>=TOTAL){gameOver();return;}loadQ();}
function updateScore(){
  document.getElementById('score-display').textContent=score;
  const s=document.getElementById('streak-display');
  s.textContent=streak; s.className='streak-val';
  if(streak>0){void s.offsetWidth;s.className='streak-val pulse';}
  document.getElementById('correct-display').textContent=correctCount;
}
function gameOver(){
  document.getElementById('game-area').style.display='none';
  document.getElementById('game-over').style.display='block';
  document.getElementById('final-score-val').textContent=score;
  document.getElementById('stat-correct').textContent=correctCount;
  document.getElementById('stat-streak').textContent=bestStreak;
  document.getElementById('stat-pct').textContent=Math.round(correctCount/TOTAL*100)+'%';
  confetti(40);
}
function restartGame(){initGame();}
function confetti(n=15){
  const c=['#f472b6','#a78bfa','#38bdf8','#fbbf24','#4ade80','#fb923c'];
  for(let i=0;i<n;i++)setTimeout(()=>{
    const e=document.createElement('div');
    e.className='confetti-piece';
    e.style.cssText=`left:${Math.random()*100}vw;background:${c[~~(Math.random()*c.length)]};width:${8+Math.random()*8}px;height:${8+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.5}s`;
    document.body.appendChild(e);setTimeout(()=>e.remove(),4000);
  },i*50);
}
initGame();
